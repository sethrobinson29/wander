services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wander
      POSTGRES_USER: wander
      POSTGRES_PASSWORD: wander_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wander"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
